# Prometheus — QLoRA training config (support-reply, Llama-3.1-8B-Instruct)
# Illustrative reference config from the MSC Labs eval harness.

model:
  base_model: meta-llama/Llama-3.1-8B-Instruct
  max_seq_len: 4096
  attn_implementation: flash_attention_2
  trust_remote_code: false

# 4-bit base weights (QLoRA)
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

# LoRA adapter
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/train.jsonl
  eval_file: data/dev.jsonl
  prompt_field: messages          # chat-formatted {system, user, assistant}
  completion_only_loss: true      # mask loss to the assistant turn
  packing: false

# Two-stage protocol: smoke test gates the full run.
stages:
  smoke_test:
    enabled: true
    max_train_samples: 1000
    num_train_epochs: 1
    eval_loss_gate: 1.15          # full run only proceeds if stage-1 eval loss <= gate
  full_run:
    num_train_epochs: 3

train:
  output_dir: outputs/prometheus-support-8b
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 8  # effective batch size 64
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 0.3
  optim: paged_adamw_8bit
  bf16: true
  gradient_checkpointing: true
  logging_steps: 20
  eval_strategy: steps
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  seed: 42

generation:
  max_new_tokens: 256
  temperature: 0.3
  top_p: 0.9

# Checkpoint selection beyond eval_loss: dev-set reward score + win rate vs baseline.
selection:
  baseline: gpt-4o-2024-08-06
  dev_winrate_min: 0.80
